name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package mod zip
        run: |
          mkdir -p dist/ai-player-v3
          cp -r mod/. dist/ai-player-v3/
          cd dist
          zip -r ai-player-v3.zip ai-player-v3

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-player-v3.zip
          generate_release_notes: true
